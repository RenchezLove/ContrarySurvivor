; QA-харнесс (Фаза 4 раунд 2): тест-действия на F1-F5 для автотестера (Computer Use),
; который не может открыть `~`-консоль (русская раскладка -> `ё`). Биндятся в
; AContrarySurvivorPlayerController::SetupInputComponent (без нового IA/IMC .uasset).
; F1 — свободная debug-камера; F2 — тест-предметы; F3 — надеть броню; F4 — снять броню.
; ДЕНЬГИ перенесены с F5 на букву M: F5 в PIE — движковый вьюмод Shader Complexity (экран
; зеленеет), нажатие триггерило И вьюмод, И +деньги. Буквенные клавиши (M/T) не являются
; движковыми вьюмод-хоткеями, поэтому конфликта нет. M — мнемоника «money».
+ActionMappings=(ActionName="QAToggleDebugCam",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=F1)
+ActionMappings=(ActionName="QAGiveItems",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=F2)
+ActionMappings=(ActionName="QAEquipArmor",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=F3)
+ActionMappings=(ActionName="QAUnequipArmor",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=F4)
+ActionMappings=(ActionName="QAGiveMoney",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=M)
; T — тест-телепорт игрока вплотную к торговцу (волки не дают подойти сверху). Буква, не вьюмод.
+ActionMappings=(ActionName="QATeleportToTrader",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=T)
; QA-харнесс (Фаза 4 раунд 3): дублёры UI-действий, которые автотестер (Computer Use) НЕ может
; кликать (HUD-клики в PIE не регистрируются из-за захвата мыши). Биндятся в
; AContrarySurvivorPlayerController::SetupInputComponent (без нового IA/IMC .uasset).
; F8 не занимаем (Eject в PIE), F11 не занимаем (fullscreen, bF11TogglesFullscreen=True).
; F6 — использовать 1-й расходник; F7 — выбросить 1-й предмет; F9 — купить самый дешёвый товар;
; F10 — продать 1-й предмет; F12 — очистить слот сейва (для теста старт-денег 50 на новой игре).
+ActionMappings=(ActionName="QAUseConsumable",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=F6)
+ActionMappings=(ActionName="QADropItem",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=F7)
+ActionMappings=(ActionName="QABuyCheapest",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=F9)
+ActionMappings=(ActionName="QASellFirst",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=F10)
+ActionMappings=(ActionName="QAClearSave",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=F12)
; QA-харнесс (Фаза 5): квесты/диалог со старостой. Тестер (Сборщик) НЕ кликает HUD и не жмёт `~`,
; поэтому весь флоу квеста дублируется буквенными клавишами (НЕ F5/F8/F11 — вьюмод/eject/fullscreen).
; Y — телепорт к старосте (как T к торговцу); G — принять квест; H — сдать квест; K — зачесть +1 волка.
+ActionMappings=(ActionName="QATeleportToElder",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Y)
+ActionMappings=(ActionName="QAAcceptQuest",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=G)
+ActionMappings=(ActionName="QATurnInQuest",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=H)
+ActionMappings=(ActionName="QACreditWolfKill",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=K)
; QA debug-инструменты (Фаза 5): god-mode / force-drop / spawn-wolf / overlay. Свободные буквы,
; не конфликтуют с вьюмодами/eject/fullscreen и существующими QA-клавишами (Q/I/Tab/E/M/T/Y/G/H/K/F1-F12).
; J — god-mode (неуязвимость + заморозка голода/жажды, авто-вкл оверлей); U — force-drop (100% лут);
; B — заспавнить тест-волка рядом; O — тумблер экранного QA-оверлея.
+ActionMappings=(ActionName="QAGodMode",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=J)
+ActionMappings=(ActionName="QAForceDrop",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=U)
+ActionMappings=(ActionName="QASpawnWolf",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=B)
+ActionMappings=(ActionName="QAToggleOverlay",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=O)
; QA debug-инструменты (Фаза 5, доп.): N — force-kill ближайшего врага (штатный урон -> смерть+лут+квест);
; V — телепорт игрока к Логову волков (место kill-квеста, навигация CU на +Y ненадёжна).
; N/V свободны (не вьюмод/eject/fullscreen; K=счётчик квеста, Y=староста, T=торговец заняты).
+ActionMappings=(ActionName="QAForceKill",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=N)
+ActionMappings=(ActionName="QATeleportToDen",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=V)
; Z — телепорт игрока к базе бандитов (зеркало V/Логово). Тестер не доходит на юг (−Y) пешком
; top-down камерой; телепорт активирует спавн бандитов «по приближению» (квест-2 «зачистить базу»).
; Z свободна (заняты Q/I/Tab/E/R/M/T/Y/G/H/K/J/U/B/O/N/V/C/X/F1-F12).
+ActionMappings=(ActionName="QATeleportToBanditBase",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Z)
; QA-харнесс (Фаза 5, демка-квесты): выдача квест-предметов для теста СДАЧИ без фарма лута
; (Сборщик не убивает волков/бандитов и не подбирает дроп вручную). C/X свободны
; (не вьюмод/eject/fullscreen; не конфликтуют с Q/I/Tab/E/M/T/Y/G/H/K/J/U/B/O/N/V/F1-F12).
; C — выдать 5 «Шкур волка» (тест сдачи кв.1); X — выдать «Ноутбук» (тест сдачи кв.2).
+ActionMappings=(ActionName="QAGiveWolfHides",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=C)
+ActionMappings=(ActionName="QAGiveNotebook",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=X)
