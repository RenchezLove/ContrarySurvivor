; QA-харнесс (Фаза 4 раунд 2): тест-действия на F1-F5 для автотестера (Computer Use),
; который не может открыть `~`-консоль (русская раскладка -> `ё`). Биндятся в
; AContrarySurvivorPlayerController::SetupInputComponent (без нового IA/IMC .uasset).
; F1 — свободная debug-камера; F2 — тест-предметы; F3 — надеть броню; F4 — снять броню.
; ДЕНЬГИ перенесены с F5 на букву M: F5 в PIE — движковый вьюмод Shader Complexity (экран
; зеленеет), нажатие триггерило И вьюмод, И +деньги. Буквенные клавиши (M/T) не являются
; движковыми вьюмод-хоткеями, поэтому конфликта нет. M — мнемоника «money».
+ActionMappings=(ActionName="QAToggleDebugCam",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=F1)
+ActionMappings=(ActionName="QAGiveItems",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=F2)
+ActionMappings=(ActionName="QAEquipArmor",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=F3)
+ActionMappings=(ActionName="QAUnequipArmor",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=F4)
+ActionMappings=(ActionName="QAGiveMoney",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=M)
; T — тест-телепорт игрока вплотную к торговцу (волки не дают подойти сверху). Буква, не вьюмод.
+ActionMappings=(ActionName="QATeleportToTrader",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=T)
; QA-харнесс (Фаза 4 раунд 3): дублёры UI-действий, которые автотестер (Computer Use) НЕ может
; кликать (HUD-клики в PIE не регистрируются из-за захвата мыши). Биндятся в
; AContrarySurvivorPlayerController::SetupInputComponent (без нового IA/IMC .uasset).
; F8 не занимаем (Eject в PIE), F11 не занимаем (fullscreen, bF11TogglesFullscreen=True).
; F6 — использовать 1-й расходник; F7 — выбросить 1-й предмет; F9 — купить самый дешёвый товар;
; F10 — продать 1-й предмет; F12 — очистить слот сейва (для теста старт-денег 50 на новой игре).
+ActionMappings=(ActionName="QAUseConsumable",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=F6)
+ActionMappings=(ActionName="QADropItem",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=F7)
+ActionMappings=(ActionName="QABuyCheapest",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=F9)
+ActionMappings=(ActionName="QASellFirst",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=F10)
+ActionMappings=(ActionName="QAClearSave",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=F12)
