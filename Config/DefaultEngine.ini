; --- Навигация: генерация навмеша ТОЛЬКО вокруг invoker'ов (Navigation Invoker) ---
; Фикс Фазы 5: динамический RecastNavMesh не успевал построить тайлы у базы бандитов
; (далеко от старта игрока) к моменту спавна -> бандиты не навигировали. С этим режимом
; навмеш генерится локально вокруг invoker'ов (игрока) и следует за ним по карте.
; Эффективно для Android (не строим весь огромный пол). Класс/модуль сверены по
; UE 5.5 заголовкам: UNavigationSystemV1 живёт в модуле NavigationSystem ->
; секция /Script/NavigationSystem.NavigationSystemV1 (НЕ /Script/Engine.* как было в UE4),
; свойство bGenerateNavigationOnlyAroundNavigationInvokers (NavigationSystem.h:386, config).
; ТРЕБОВАНИЕ: у RecastNavMesh актёра уровня RuntimeGeneration=Dynamic (подтверждено QA).
[/Script/NavigationSystem.NavigationSystemV1]
bGenerateNavigationOnlyAroundNavigationInvokers=false
bAddPlayersToGenerationSeeds=true

